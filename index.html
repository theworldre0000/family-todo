<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://firestore.googleapis.com wss://*.firebaseio.com;">
<title>우리가족 투두 🏠</title>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6ee;
  --card: #ffffff;
  --border: #f0e6d3;
  --shadow: rgba(180,140,100,0.12);

  --dad: #3d6b8e;
  --dad-light: #e8f2f9;
  --mom: #c96b8e;
  --mom-light: #fce8f0;
  --sua: #e8943a;
  --sua-light: #fdf0e2;
  --jia: #5ba87c;
  --jia-light: #e5f5ed;

  --text: #2d2416;
  --text-muted: #9e8c7a;
  --accent: #f5a623;
  --radius: 16px;
  --font-main: 'Gmarket Sans', sans-serif;
  --font-fun: 'Gaegu', cursive;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── BACKGROUND PATTERN ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(245,166,35,0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(91,168,124,0.06) 0%, transparent 50%),
    radial-gradient(circle at 60% 10%, rgba(201,107,142,0.05) 0%, transparent 40%);
  pointer-events:none; z-index:0;
}

/* ═══════════════════════════════
   LOGIN SCREEN
═══════════════════════════════ */
#loginScreen {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  z-index:999;
  background: linear-gradient(135deg, #fdf6ee 0%, #fce8f0 50%, #e8f2f9 100%);
}
.login-box {
  background: white;
  border-radius: 32px;
  padding: 48px 40px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 20px 60px rgba(180,140,100,0.18);
  text-align: center;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.8) translateY(20px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.login-emoji { font-size: 64px; margin-bottom: 12px; }
.login-title {
  font-family: var(--font-fun);
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 36px; }

.member-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.member-btn {
  padding: 20px 12px;
  border-radius: 20px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-family: var(--font-main);
  font-size: 15px;
  font-weight: 700;
}
.member-btn:hover { transform: translateY(-3px) scale(1.02); }
.member-btn .m-emoji { font-size: 36px; }
.btn-dad { background: var(--dad-light); color: var(--dad); border-color: var(--dad); }
.btn-mom { background: var(--mom-light); color: var(--mom); border-color: var(--mom); }
.btn-sua { background: var(--sua-light); color: var(--sua); border-color: var(--sua); }
.btn-jia { background: var(--jia-light); color: var(--jia); border-color: var(--jia); }

.pin-section { display:none; margin-top:8px; }
.pin-section.show { display:block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.pin-label { font-size: 13px; color: var(--text-muted); margin-bottom: 10px; }
.pin-input {
  width: 100%;
  padding: 14px 18px;
  border-radius: 12px;
  border: 2px solid var(--border);
  font-size: 20px;
  letter-spacing: 8px;
  text-align: center;
  font-family: var(--font-main);
  font-weight: 700;
  outline: none;
  transition: border-color 0.2s;
  background: var(--bg);
}
.pin-input:focus { border-color: var(--accent); }
.pin-go {
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--font-main);
  cursor: pointer;
  transition: all 0.2s;
}
.pin-go:hover { background: #e0961a; transform: translateY(-1px); }
.pin-error { color: #e05555; font-size: 12px; margin-top: 6px; display:none; }

/* ═══════════════════════════════
   MAIN APP
═══════════════════════════════ */
#app { display:none; position:relative; z-index:1; }

/* ── HEADER ── */
header {
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 2px 20px var(--shadow);
}
.header-left { display:flex; align-items:center; gap:12px; }
.header-logo {
  font-family: var(--font-fun);
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
}
.user-pill {
  display:flex; align-items:center; gap:6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
}
.header-right { display:flex; align-items:center; gap:10px; }
.date-pill {
  font-size: 13px;
  color: var(--text-muted);
  background: var(--bg);
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.logout-btn {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: white;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-main);
  transition: all 0.15s;
}
.logout-btn:hover { border-color: var(--text-muted); color: var(--text); }

/* ── NAV TABS ── */
.tabs {
  display:flex;
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  padding: 14px 22px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: all 0.2s;
  margin-bottom: -2px;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ── MAIN CONTENT ── */
.main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
.view { display:none; }
.view.active { display:block; animation: fadeIn 0.3s; }

/* ═══════════════════════════════
   TODO VIEW
═══════════════════════════════ */
.todo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.todo-title {
  font-family: var(--font-fun);
  font-size: 28px;
  font-weight: 700;
}
.todo-title span { color: var(--accent); }

.add-todo-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.todo-input {
  flex: 1;
  padding: 14px 18px;
  border-radius: 14px;
  border: 2px solid var(--border);
  font-size: 15px;
  font-family: var(--font-main);
  background: white;
  outline: none;
  transition: border-color 0.2s;
}
.todo-input:focus { border-color: var(--accent); }
.todo-input::placeholder { color: #c5b8a9; }
.add-btn {
  padding: 14px 22px;
  border-radius: 14px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--font-main);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.add-btn:hover { background:#e0961a; transform:translateY(-1px); }

.todo-list { display: flex; flex-direction: column; gap: 10px; }

.todo-item {
  background: white;
  border-radius: 16px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  border: 2px solid var(--border);
  transition: all 0.2s;
  animation: slideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideIn {
  from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)}
}
.todo-item:hover { box-shadow: 0 4px 20px var(--shadow); transform: translateY(-1px); }
.todo-item.done { opacity: 0.6; background: #fafaf8; }

.check-wrap {
  width: 28px; height: 28px; flex-shrink: 0;
  position: relative; cursor: pointer;
}
.check-wrap input { display:none; }
.checkmark {
  width: 28px; height: 28px;
  border-radius: 8px;
  border: 2.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-size: 14px;
  background: white;
}
.check-wrap input:checked ~ .checkmark {
  background: var(--green);
  border-color: var(--green);
  animation: checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes checkPop {
  0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)}
}
.todo-text {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.2s;
}
.todo-item.done .todo-text {
  text-decoration: line-through;
  color: var(--text-muted);
}
.todo-priority {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 700;
}
.p-high { background:#ffe5e5; color:#e05555; }
.p-mid  { background:#fff4e0; color:#e08c1a; }
.p-low  { background:#e8f5e9; color:#4caf50; }

.todo-del {
  background:none; border:none; color:#d0c4b8; font-size:18px;
  cursor:pointer; padding:4px; border-radius:6px; transition:color 0.15s;
  line-height:1;
}
.todo-del:hover { color: #e05555; }

.empty-todo {
  text-align:center; padding:48px 24px;
  color: var(--text-muted);
  font-family: var(--font-fun);
  font-size: 18px;
}
.empty-todo .e-emoji { font-size:48px; margin-bottom:12px; }

/* ═══════════════════════════════
   DASHBOARD VIEW
═══════════════════════════════ */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 28px;
}

.member-card {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  border: 2px solid var(--border);
  transition: all 0.2s;
}
.member-card:hover { box-shadow: 0 8px 32px var(--shadow); transform: translateY(-2px); }

.mc-header {
  display:flex; align-items:center; gap:12px; margin-bottom:16px;
}
.mc-avatar {
  width: 48px; height: 48px;
  border-radius: 14px;
  display:flex; align-items:center; justify-content:center;
  font-size: 24px;
}
.mc-name { font-size: 18px; font-weight: 700; }
.mc-role { font-size: 12px; color: var(--text-muted); }

.mc-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.mc-stat {
  background: var(--bg);
  border-radius: 10px;
  padding: 10px 8px;
  text-align:center;
}
.mc-stat-val {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-fun);
}
.mc-stat-label {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 2px;
  font-weight: 500;
}

.progress-wrap { margin-bottom: 8px; }
.progress-label {
  display:flex; justify-content:space-between;
  font-size: 12px; color: var(--text-muted);
  margin-bottom: 6px; font-weight: 500;
}
.progress-bar {
  height: 10px;
  background: var(--bg);
  border-radius: 5px;
  overflow:hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}

.compliment-box {
  background: linear-gradient(135deg, #fff8e8, #ffefd0);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 700;
  color: #8a6000;
  display:flex; align-items:flex-start; gap:6px;
  margin-top: 12px;
}

/* ── WEEKLY/MONTHLY SECTION ── */
.section-title {
  font-family: var(--font-fun);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 16px;
  display:flex; align-items:center; gap:8px;
}

.chart-card {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  border: 2px solid var(--border);
  margin-bottom: 20px;
}
.chart-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text-muted); }

.bar-chart { display:flex; align-items:flex-end; gap:8px; height: 120px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
.bar-fill {
  width: 100%;
  border-radius: 6px 6px 0 0;
  min-height: 4px;
  transition: height 0.6s cubic-bezier(0.4,0,0.2,1);
}
.bar-label { font-size: 10px; color: var(--text-muted); font-weight: 700; }
.bar-val { font-size: 11px; font-weight: 700; }

.ranking-list { display:flex; flex-direction:column; gap:10px; }
.rank-item {
  display:flex; align-items:center; gap:14px;
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 12px;
}
.rank-no {
  font-size: 18px; font-weight: 700; width:28px; text-align:center;
  font-family: var(--font-fun);
}
.rank-name { font-size: 15px; font-weight: 700; flex:1; }
.rank-score { font-size: 18px; font-weight: 700; font-family: var(--font-fun); }

/* ── COMPLIMENT EDITOR ── */
.compliment-editor {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  border: 2px solid var(--border);
  margin-top: 20px;
}
.comp-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.comp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.comp-item { display:flex; flex-direction:column; gap:6px; }
.comp-label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
.comp-input {
  padding: 10px 14px;
  border-radius: 10px;
  border: 2px solid var(--border);
  font-size: 13px;
  font-family: var(--font-main);
  outline:none;
  transition: border-color 0.2s;
  resize: none;
}
.comp-input:focus { border-color: var(--accent); }
.comp-save {
  width: 100%;
  margin-top: 14px;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-main);
  cursor: pointer;
  transition: all 0.2s;
}
.comp-save:hover { background:#e0961a; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background: #2d2416;
  color:white;
  padding:13px 24px;
  border-radius:40px;
  font-size:14px; font-weight:700;
  z-index:9999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space:nowrap;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.success { background:#5ba87c; }

/* ── CONFETTI ── */
.confetti-piece {
  position:fixed;
  width:10px; height:10px;
  border-radius:2px;
  animation: confettiDrop 1.5s ease-in forwards;
  z-index:9998; pointer-events:none;
}
@keyframes confettiDrop {
  0%{opacity:1;transform:translateY(-20px) rotate(0deg);}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg);}
}

/* ── PRIORITY SELECT ── */
.priority-sel {
  padding: 13px 14px;
  border-radius: 14px;
  border: 2px solid var(--border);
  font-size: 14px;
  font-family: var(--font-main);
  background: white;
  outline:none;
  cursor:pointer;
  transition: border-color 0.2s;
  color: var(--text);
}
.priority-sel:focus { border-color: var(--accent); }

/* responsive */
@media(max-width:600px){
  .dash-grid { grid-template-columns:1fr; }
  .comp-grid { grid-template-columns:1fr; }
  .mc-stats { grid-template-columns:repeat(3,1fr); }
  .add-todo-row { flex-wrap:wrap; }
  header { padding:0 16px; }
  .main { padding:20px 16px; }
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-emoji">🏠</div>
    <div class="login-title">우리가족 투두</div>
    <div class="login-sub">누구로 접속할까요?</div>

    <div class="member-grid">
      <button class="member-btn btn-dad" onclick="selectMember('dad')">
        <span class="m-emoji">👨</span>아빠
      </button>
      <button class="member-btn btn-mom" onclick="selectMember('mom')">
        <span class="m-emoji">👩</span>엄마
      </button>
      <button class="member-btn btn-sua" onclick="selectMember('sua')">
        <span class="m-emoji">🌸</span>수아
      </button>
      <button class="member-btn btn-jia" onclick="selectMember('jia')">
        <span class="m-emoji">🌿</span>지아
      </button>
    </div>

    <div class="pin-section" id="pinSection">
      <div class="pin-label" id="pinLabel">비밀번호를 입력하세요</div>
      <input class="pin-input" id="pinInput" type="password" maxlength="4" placeholder="••••"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pin-go" onclick="doLogin()">입장하기 ✨</button>
      <div class="pin-error" id="pinError">❌ 비밀번호가 틀렸어요!</div>
    </div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">🏠 우리가족 투두</div>
      <div class="user-pill" id="userPill"></div>
    </div>
    <div class="header-right">
      <div class="date-pill" id="datePill"></div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="tabs" id="tabBar">
    <div class="tab active" onclick="switchTab('todo',this)">📝 오늘의 할 일</div>
    <!-- dashboard tab added dynamically for dad -->
  </div>

  <div class="main">
    <!-- ── TODO VIEW ── -->
    <div class="view active" id="view-todo">
      <div class="todo-header">
        <div>
          <div class="todo-title">오늘의 할 일 <span>✏️</span></div>
          <div style="font-size:13px;color:var(--text-muted);margin-top:4px;" id="todoSubtitle"></div>
        </div>
        <div id="todayProgress" style="font-size:13px;font-weight:700;color:var(--accent);"></div>
      </div>

      <div class="add-todo-row">
        <input class="todo-input" id="todoInput" placeholder="새 할 일을 입력하세요 🌟" onkeydown="if(event.key==='Enter')addTodo()">
        <select class="priority-sel" id="prioritySel">
          <option value="high">🔴 중요</option>
          <option value="mid" selected>🟡 보통</option>
          <option value="low">🟢 여유</option>
        </select>
        <button class="add-btn" onclick="addTodo()">+ 추가</button>
      </div>

      <div class="todo-list" id="todoList"></div>
    </div>

    <!-- ── DASHBOARD VIEW (dad only) ── -->
    <div class="view" id="view-dashboard">
      <div style="font-family:var(--font-fun);font-size:28px;font-weight:700;margin-bottom:24px;">
        📊 가족 대시보드
      </div>

      <!-- Member Cards -->
      <div class="dash-grid" id="memberCards"></div>

      <!-- Charts Section -->
      <div style="margin-bottom:28px;">
        <div style="font-family:var(--font-fun);font-size:22px;font-weight:700;margin-bottom:16px;">📅 이번 주 현황</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;" id="weekChartIndividual"></div>
        <div class="chart-card" id="weekChartTotal"></div>
      </div>
      <div class="chart-card" style="margin-bottom:28px;">
        <div class="section-title">🏆 이번 달 랭킹</div>
        <div class="ranking-list" id="monthRanking"></div>
      </div>

      <!-- Compliment Editor -->
      <div class="compliment-editor">
        <div class="comp-title">💌 오늘의 칭찬 메시지 작성</div>
        <div class="comp-grid" id="complimentGrid"></div>
        <button class="comp-save" onclick="saveCompliments()">💾 칭찬 저장하기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
// CONFIG
// ══════════════════════════════
window.MEMBERS = {
  dad: { name:'아빠', emoji:'👨', color:'var(--dad)', light:'var(--dad-light)', pin:'1234', role:'가족' },
  mom: { name:'엄마', emoji:'👩', color:'var(--mom)', light:'var(--mom-light)', pin:'0000', role:'가족' },
  sua: { name:'수아', emoji:'🌸', color:'var(--sua)', light:'var(--sua-light)', pin:'1111', role:'가족' },
  jia: { name:'지아', emoji:'🌿', color:'var(--jia)', light:'var(--jia-light)', pin:'2222', role:'가족' },
};
const MEMBERS = window.MEMBERS;

// 초기 비밀번호: 아빠 1234 / 엄마 0000 / 수아 1111 / 지아 2222
// (위 MEMBERS 객체에서 pin 값 수정하세요)

window.currentUser = null;
let currentUser = null;
let selectedMemberKey = null;
window.TODAY = new Date().toISOString().split('T')[0];
const TODAY = window.TODAY;

// ── Storage Helpers ──
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function load(key, def) { try { const v=localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }

function getTodos(user) { return load(`todos_${user}_${TODAY}`, []); }
function saveTodos(user, list) { save(`todos_${user}_${TODAY}`, list); }
function getCompliments() { return load('compliments', {}); }
window.getCompliments = getCompliments;
function saveComplimentsData(d) { save('compliments', d); }

// ── Date ──
function formatDate() {
  const d = new Date();
  const days=['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

// ══════════════════════════════
// LOGIN
// ══════════════════════════════
function selectMember(key) {
  selectedMemberKey = key;
  document.getElementById('pinSection').classList.add('show');
  document.getElementById('pinLabel').textContent = `${MEMBERS[key].emoji} ${MEMBERS[key].name}의 비밀번호`;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').style.display = 'none';
  document.getElementById('pinInput').focus();
}

function doLogin() {
  const pin = document.getElementById('pinInput').value;
  const m = MEMBERS[selectedMemberKey];
  if (pin === m.pin) {
    currentUser = selectedMemberKey;
    window.currentUser = selectedMemberKey;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pinError').style.display = 'block';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function doLogout() {
  currentUser = null;
  window.currentUser = null;
  selectedMemberKey = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pinSection').classList.remove('show');
}

// ══════════════════════════════
// INIT APP
// ══════════════════════════════
function initApp() {
  const m = MEMBERS[currentUser];
  // User pill
  document.getElementById('userPill').innerHTML = `<span style="margin-right:4px">${m.emoji}</span>${m.name}`;
  document.getElementById('userPill').style.cssText += `;background:${m.light};color:${m.color};font-weight:700;`;
  document.getElementById('datePill').textContent = formatDate();

  // Tabs — dashboard for everyone
  const tabBar = document.getElementById('tabBar');
  const oldDash = document.getElementById('dashTab');
  if (oldDash) oldDash.remove();
  const dt = document.createElement('div');
  dt.className = 'tab';
  dt.id = 'dashTab';
  dt.textContent = '📊 대시보드';
  dt.onclick = function(){ switchTab('dashboard', this); };
  tabBar.appendChild(dt);

  // Set active tab
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tabBar.querySelector('.tab').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-todo').classList.add('active');

  renderTodos();
}

// ══════════════════════════════
// TODO
// ══════════════════════════════
function addTodo() {
  const input = document.getElementById('todoInput');
  const text = input.value.trim();
  if (!text) return;
  const priority = document.getElementById('prioritySel').value;
  const todos = getTodos(currentUser);
  todos.push({ id: Date.now(), text, priority, done: false });
  saveTodos(currentUser, todos);
  input.value = '';
  renderTodos();
  showToast('✅ 할 일이 추가됐어요!', 'success');
}

function toggleTodo(id) {
  const todos = getTodos(currentUser);
  const t = todos.find(x=>x.id===id);
  if (!t) return;
  t.done = !t.done;
  saveTodos(currentUser, todos);
  renderTodos();
  if (t.done) {
    showToast('🎉 완료! 잘했어요!', 'success');
    confetti();
  }
}

function deleteTodo(id) {
  let todos = getTodos(currentUser);
  todos = todos.filter(x=>x.id!==id);
  saveTodos(currentUser, todos);
  renderTodos();
}

function renderTodos() {
  const todos = getTodos(currentUser);
  const done = todos.filter(t=>t.done).length;
  const total = todos.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const m = MEMBERS[currentUser];

  document.getElementById('todoSubtitle').textContent = `${m.name}의 오늘 할 일`;
  document.getElementById('todayProgress').textContent = total ? `${done}/${total} 완료 (${pct}%)` : '';

  const list = document.getElementById('todoList');
  if (!todos.length) {
    list.innerHTML = `<div class="empty-todo"><div class="e-emoji">📭</div>오늘 할 일을 추가해보세요!</div>`;
    return;
  }

  const pMap = { high:['🔴','중요','p-high'], mid:['🟡','보통','p-mid'], low:['🟢','여유','p-low'] };
  list.innerHTML = [...todos].sort((a,b)=>{
    const order={high:0,mid:1,low:2};
    return order[a.priority]-order[b.priority];
  }).map(t => {
    const [icon,label,cls] = pMap[t.priority]||pMap.mid;
    return `
    <div class="todo-item ${t.done?'done':''}">
      <label class="check-wrap">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
        <div class="checkmark" style="${t.done?'background:'+MEMBERS[currentUser].color+';border-color:'+MEMBERS[currentUser].color+';':''}">${t.done?'✓':''}</div>
      </label>
      <div class="todo-text">${t.text}</div>
      <div class="todo-priority ${cls}">${icon} ${label}</div>
      <button class="todo-del" onclick="deleteTodo(${t.id})">×</button>
    </div>`;
  }).join('');
}

// ══════════════════════════════
// DASHBOARD
// ══════════════════════════════
function renderDashboard() { if(window._firebaseReady && window.renderDashboard !== renderDashboard) { window.renderDashboard(); return; }
  // Firebase async 버전이 로드되면 그걸 사용, 아니면 기존 방식
  if(window._firebaseReady) {
    window.renderDashboard();
  } else {
    renderMemberCards();
    renderWeekChart();
    renderMonthRanking();
    renderComplimentEditor();
  }
}

function getMemberStats(key) {
  // Today
  const todayTodos = load(`todos_${key}_${TODAY}`, []);
  const todayTotal = todayTodos.length;
  const todayDone = todayTodos.filter(t=>t.done).length;

  // Weekly (last 7 days)
  let weekTotal=0, weekDone=0;
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const dk=d.toISOString().split('T')[0];
    const ts=load(`todos_${key}_${dk}`,[]);
    weekTotal+=ts.length; weekDone+=ts.filter(t=>t.done).length;
  }

  // Monthly (last 30 days)
  let monthTotal=0, monthDone=0;
  for(let i=0;i<30;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const dk=d.toISOString().split('T')[0];
    const ts=load(`todos_${key}_${dk}`,[]);
    monthTotal+=ts.length; monthDone+=ts.filter(t=>t.done).length;
  }

  return { todayTotal,todayDone,weekTotal,weekDone,monthTotal,monthDone };
}

function getComplimentFor(key) {
  const comps = getCompliments();
  return comps[key] || '';
}

const COMPLIMENT_DEFAULTS = {
  dad: '아빠, 오늘도 수고 많았어요! 💙',
  mom: '오늘도 가족을 위해 수고했어요! 💕',
  sua: '수아야, 오늘도 열심히 했어! 🌸',
  jia: '지아야, 최고야! 대단해! 🌟',
};
window.COMPLIMENT_DEFAULTS = COMPLIMENT_DEFAULTS;

function renderMemberCards() {
  const container = document.getElementById('memberCards');
  const nonDadKeys = ['dad','mom','sua','jia'];
  container.innerHTML = nonDadKeys.map(key => {
    const m = MEMBERS[key];
    const s = getMemberStats(key);
    const todayPct = s.todayTotal ? Math.round(s.todayDone/s.todayTotal*100) : 0;
    const weekPct = s.weekTotal ? Math.round(s.weekDone/s.weekTotal*100) : 0;
    const comp = getComplimentFor(key) || COMPLIMENT_DEFAULTS[key] || '';
    return `
    <div class="member-card">
      <div class="mc-header">
        <div class="mc-avatar" style="background:${m.light};font-size:24px">${m.emoji}</div>
        <div><div class="mc-name" style="color:${m.color}">${m.name}</div><div class="mc-role">${m.role}</div></div>
      </div>
      <div class="mc-stats">
        <div class="mc-stat">
          <div class="mc-stat-val" style="color:${m.color}">${s.todayDone}</div>
          <div class="mc-stat-label">오늘 완료</div>
        </div>
        <div class="mc-stat">
          <div class="mc-stat-val" style="color:${m.color}">${s.weekDone}</div>
          <div class="mc-stat-label">주간 완료</div>
        </div>
        <div class="mc-stat">
          <div class="mc-stat-val" style="color:${m.color}">${s.monthDone}</div>
          <div class="mc-stat-label">월간 완료</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>오늘 달성률</span><span>${todayPct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${todayPct}%;background:${m.color}"></div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>주간 달성률</span><span>${weekPct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${weekPct}%;background:${m.color};opacity:0.5"></div></div>
      </div>
      ${comp ? `<div class="compliment-box">💌 ${comp}</div>` : ''}
    </div>`;
  }).join('');
}

function renderWeekChart() {
  const days=['월','화','수','목','금','토','일'];
  const keys=['dad','mom','sua','jia'];

  // 7일치 날짜 배열
  const dateKeys = [];
  const dayLabels = [];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    dateKeys.push(d.toISOString().split('T')[0]);
    dayLabels.push(days[(d.getDay()+6)%7]);
  }

  // 개인별 데이터
  const memberData = keys.map(k => {
    const m = MEMBERS[k];
    const data = dateKeys.map((dk, di) => {
      const ts = load(`todos_${k}_${dk}`, []);
      const total = ts.length, done = ts.filter(t=>t.done).length;
      return { label: dayLabels[di], pct: total ? Math.round(done/total*100) : 0, done, total };
    });
    const weekTotal = data.reduce((a,d)=>a+d.total,0);
    const weekDone  = data.reduce((a,d)=>a+d.done,0);
    const weekPct   = weekTotal ? Math.round(weekDone/weekTotal*100) : 0;
    return { key:k, m, data, weekDone, weekTotal, weekPct };
  });

  // ── 개인 4개 카드 ──
  document.getElementById('weekChartIndividual').innerHTML = memberData.map(({key,m,data,weekDone,weekTotal,weekPct}) => {
    const maxPct = Math.max(...data.map(d=>d.pct), 1);
    const bars = data.map((d,i) => `
      <div class="bar-col">
        <div class="bar-val" style="color:${m.color};font-size:10px">${d.pct}%</div>
        <div class="bar-fill" style="height:${Math.round(d.pct/maxPct*64)+3}px;background:${m.color};border-radius:4px 4px 0 0;width:100%;opacity:${0.4+0.6*(i/6)}"></div>
        <div class="bar-label">${d.label}</div>
      </div>`).join('');
    return `
    <div class="chart-card" style="padding:18px 16px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
        <span style="font-size:20px">${m.emoji}</span>
        <span style="font-size:14px;font-weight:700;color:${m.color}">${m.name}</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">${weekDone}/${weekTotal}개 완료 · <b style="color:${m.color}">${weekPct}%</b></div>
      <div class="bar-chart" style="height:90px;gap:4px;">${bars}</div>
    </div>`;
  }).join('');

  // ── 총합 1개 ──
  const totalData = dateKeys.map((dk, di) => {
    let done=0, total=0;
    keys.forEach(k=>{ const ts=load(`todos_${k}_${dk}`,[]);  total+=ts.length; done+=ts.filter(t=>t.done).length; });
    return { label: dayLabels[di], pct: total?Math.round(done/total*100):0, done, total };
  });
  const grandDone  = totalData.reduce((a,d)=>a+d.done,0);
  const grandTotal = totalData.reduce((a,d)=>a+d.total,0);
  const grandPct   = grandTotal?Math.round(grandDone/grandTotal*100):0;
  const maxPct = Math.max(...totalData.map(d=>d.pct), 1);

  const totalBars = totalData.map((d,i) => `
    <div class="bar-col">
      <div class="bar-val" style="color:var(--accent)">${d.pct}%</div>
      <div class="bar-fill" style="height:${Math.round(d.pct/maxPct*80)+4}px;background:var(--accent);border-radius:4px 4px 0 0;width:100%;opacity:${0.4+0.6*(i/6)}"></div>
      <div class="bar-label">${d.label}</div>
    </div>`).join('');

  document.getElementById('weekChartTotal').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div style="font-size:15px;font-weight:700;">👨‍👩‍👧‍👧 가족 전체 합산</div>
      <div style="font-size:13px;color:var(--text-muted);">${grandDone}/${grandTotal}개 완료</div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px;">주간 달성률 <b style="color:var(--accent);font-size:16px;">${grandPct}%</b></div>
    <div class="bar-chart" style="height:110px;">${totalBars}</div>`;
}

function renderMonthRanking() {
  const keys=['dad','mom','sua','jia'];
  const medals=['🥇','🥈','🥉','4️⃣'];
  const ranked = keys.map(k=>{
    const s=getMemberStats(k);
    return { key:k, score:s.monthDone };
  }).sort((a,b)=>b.score-a.score);

  document.getElementById('monthRanking').innerHTML = ranked.map((r,i)=>{
    const m=MEMBERS[r.key];
    return `
    <div class="rank-item">
      <div class="rank-no">${medals[i]||i+1}</div>
      <div style="font-size:20px">${m.emoji}</div>
      <div class="rank-name" style="color:${m.color}">${m.name}</div>
      <div class="rank-score" style="color:${m.color}">${r.score}개</div>
    </div>`;
  }).join('');
}

function renderComplimentEditor() {
  const keys=['dad','mom','sua','jia'];
  const comps=getCompliments();
  document.getElementById('complimentGrid').innerHTML = keys.map(k=>{
    const m=MEMBERS[k];
    return `
    <div class="comp-item">
      <div class="comp-label">${m.emoji} ${m.name}에게</div>
      <textarea class="comp-input" id="comp_${k}" rows="2" placeholder="${COMPLIMENT_DEFAULTS[k]||'칭찬 메시지를 입력하세요'}">${comps[k]||''}</textarea>
    </div>`;
  }).join('');
}

function saveCompliments() {
  const keys=['dad','mom','sua','jia'];
  const comps={};
  keys.forEach(k=>{
    const el=document.getElementById(`comp_${k}`);
    if(el) comps[k]=el.value.trim();
  });
  saveComplimentsData(comps);
  renderMemberCards();
  showToast('💌 칭찬 메시지가 저장됐어요!','success');
  confetti();
}

// ══════════════════════════════
// NAV
// ══════════════════════════════
function switchTab(view, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  if(view==='dashboard') renderDashboard();
}

// ══════════════════════════════
// UI HELPERS
// ══════════════════════════════
function showToast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2800);
}

function confetti() {
  const colors=['#f5a623','#5ba87c','#c96b8e','#3d6b8e','#ffd700','#ff6b6b'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`
      left:${Math.random()*100}vw;
      top:${-10+Math.random()*10}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${1+Math.random()}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

// init date display on load
document.getElementById('datePill') && (document.getElementById('datePill').textContent = formatDate());
</script>

<script>
// ── Firebase 초기화 ──
const _fbConfig = {
  apiKey: "AIzaSyBGklbx40Q7PKJGCuDYAE75BXFkAh47usY",
  authDomain: "family-todos-db383.firebaseapp.com",
  projectId: "family-todos-db383",
  storageBucket: "family-todos-db383.firebasestorage.app",
  messagingSenderId: "913060872180",
  appId: "1:913060872180:web:a5e3b4324b8e6f079b43a1"
};
firebase.initializeApp(_fbConfig);
const _db = firebase.firestore();

// ── saveTodos: 로컬 + Firebase ──
window.saveTodos = async function(user, list) {
  const key = user + '_' + TODAY;
  localStorage.setItem('todos_' + key, JSON.stringify(list));
  try { await _db.collection('todos').doc(key).set({ items: list }); } catch(e) { console.warn('FB save error', e); }
};

// ── saveComplimentsData: 로컬 + Firebase ──
window.saveComplimentsData = async function(data) {
  localStorage.setItem('compliments', JSON.stringify(data));
  try { await _db.collection('compliments').doc('data').set(data); } catch(e) { console.warn('FB comp error', e); }
};

// ── Firebase에서 특정 날짜 로드 (캐시 없을 때만) ──
async function _fbLoad(user, dateStr) {
  const lk = 'todos_' + user + '_' + dateStr;
  if (localStorage.getItem(lk)) return;
  try {
    const snap = await _db.collection('todos').doc(user + '_' + dateStr).get();
    if (snap.exists) localStorage.setItem(lk, JSON.stringify(snap.data().items || []));
  } catch(e) {}
}

// ── getMemberStats async ──
window.getMemberStatsAsync = async function(key) {
  let r = { todayTotal:0, todayDone:0, weekTotal:0, weekDone:0, monthTotal:0, monthDone:0 };
  for (let i = 0; i < 30; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dk = d.toISOString().split('T')[0];
    await _fbLoad(key, dk);
    const raw = localStorage.getItem('todos_' + key + '_' + dk);
    const ts = raw ? JSON.parse(raw) : [];
    const done = ts.filter(t => t.done).length;
    if (i === 0) { r.todayTotal = ts.length; r.todayDone = done; }
    if (i < 7)  { r.weekTotal += ts.length;  r.weekDone += done; }
    r.monthTotal += ts.length; r.monthDone += done;
  }
  return r;
};

// ── 실시간 리스너 ──
function _subscribe() {
  ['dad','mom','sua','jia'].forEach(k => {
    _db.collection('todos').doc(k + '_' + TODAY).onSnapshot(snap => {
      if (snap && snap.exists) {
        localStorage.setItem('todos_' + k + '_' + TODAY, JSON.stringify(snap.data().items || []));
        if (window.currentUser === k) renderTodos();
      }
    });
  });
  _db.collection('compliments').doc('data').onSnapshot(snap => {
    if (snap && snap.exists) localStorage.setItem('compliments', JSON.stringify(snap.data()));
  });
}

// ── 대시보드 렌더 (async) ──
window.renderDashboard = async function() {
  // 멤버 카드
  const container = document.getElementById('memberCards');
  container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:#9e8c7a">⏳ 불러오는 중...</div>';
  const keys = ['dad','mom','sua','jia'];
  const cards = await Promise.all(keys.map(async key => {
    const m = MEMBERS[key];
    const s = await getMemberStatsAsync(key);
    const tp = s.todayTotal ? Math.round(s.todayDone/s.todayTotal*100) : 0;
    const wp = s.weekTotal  ? Math.round(s.weekDone/s.weekTotal*100)   : 0;
    const comp = getCompliments()[key] || COMPLIMENT_DEFAULTS[key] || '';
    return '<div class="member-card">' +
      '<div class="mc-header">' +
        '<div class="mc-avatar" style="background:'+m.light+';font-size:24px">'+m.emoji+'</div>' +
        '<div><div class="mc-name" style="color:'+m.color+'">'+m.name+'</div><div class="mc-role">'+m.role+'</div></div>' +
      '</div>' +
      '<div class="mc-stats">' +
        '<div class="mc-stat"><div class="mc-stat-val" style="color:'+m.color+'">'+s.todayDone+'</div><div class="mc-stat-label">오늘 완료</div></div>' +
        '<div class="mc-stat"><div class="mc-stat-val" style="color:'+m.color+'">'+s.weekDone+'</div><div class="mc-stat-label">주간 완료</div></div>' +
        '<div class="mc-stat"><div class="mc-stat-val" style="color:'+m.color+'">'+s.monthDone+'</div><div class="mc-stat-label">월간 완료</div></div>' +
      '</div>' +
      '<div class="progress-wrap">' +
        '<div class="progress-label"><span>오늘 달성률</span><span>'+tp+'%</span></div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:'+tp+'%;background:'+m.color+'"></div></div>' +
      '</div>' +
      '<div class="progress-wrap">' +
        '<div class="progress-label"><span>주간 달성률</span><span>'+wp+'%</span></div>' +
        '<div class="progress-bar"><div class="progress-fill" style="width:'+wp+'%;background:'+m.color+';opacity:0.5"></div></div>' +
      '</div>' +
      (comp ? '<div class="compliment-box">💌 ' + comp + '</div>' : '') +
    '</div>';
  }));
  container.innerHTML = cards.join('');

  // 주간 차트
  renderWeekChart();

  // 월간 랭킹
  const rows = await Promise.all(keys.map(async k => {
    const s = await getMemberStatsAsync(k);
    return { key:k, score:s.monthDone };
  }));
  const ranked = rows.sort((a,b) => b.score - a.score);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  document.getElementById('monthRanking').innerHTML = ranked.map((r,i) => {
    const m = MEMBERS[r.key];
    return '<div class="rank-item">' +
      '<div class="rank-no">'+medals[i]+'</div>' +
      '<div style="font-size:20px">'+m.emoji+'</div>' +
      '<div class="rank-name" style="color:'+m.color+'">'+m.name+'</div>' +
      '<div class="rank-score" style="color:'+m.color+'">'+r.score+'개</div>' +
    '</div>';
  }).join('');

  // 칭찬 에디터
  renderComplimentEditor();
};

// ── 앱 시작 ──
(async function() {
  // 오늘 데이터 프리로드
  await Promise.all(['dad','mom','sua','jia'].map(k => _fbLoad(k, TODAY)));
  // 칭찬 데이터 로드
  try {
    const snap = await _db.collection('compliments').doc('data').get();
    if (snap.exists) localStorage.setItem('compliments', JSON.stringify(snap.data()));
  } catch(e) {}
  // 실시간 구독
  _subscribe();
  window._firebaseReady = true;
  showToast('🔥 연결 완료!', 'success');
})();
</script>
